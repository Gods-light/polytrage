name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: pytest -q

  evolve:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"

      - name: Evolve (offline, fixtures — must succeed)
        run: python scripts/evolve.py --fixtures

      - name: Evolve (live, best-effort — network may be blocked)
        run: python scripts/evolve.py
        continue-on-error: true

      - name: Commit changes if any
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add params.json LEADERBOARD.md results/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m 'evolve: nightly parameter update'
            git pull --rebase origin main
            git push
          fi
